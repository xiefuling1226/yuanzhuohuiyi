<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>光年圆桌会</title>

  <!-- 分享Meta标签 -->
  <meta name="description" content="光年圆桌会 — 邀请历史名人围桌讨论你的问题，多角度思维碰撞，获得可操作方案。">
  <meta property="og:title" content="光年圆桌会">
  <meta property="og:description" content="邀请孔子、老子、乔布斯等名人围桌讨论你的问题">
  <meta property="og:type" content="website">
  <meta name="twitter:card" content="summary_large_image">

  <!-- 苹果设备适配 -->
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="光年圆桌会">
  <meta name="theme-color" content="#5B4A3F">

  <link rel="stylesheet" href="style.css?v=13">
</head>
<body>
  <div id="app">
    <!-- 顶部栏 -->
    <header class="header">
      <div class="header-left">
        <img class="header-logo" src="logo.png" alt="光年圆桌会">
        <div class="header-text">
          <h1>光年圆桌会</h1>
          <p class="header-subtitle" id="headerSubtitle">点击右侧 + 邀请嘉宾</p>
        </div>
      </div>
      <div class="header-actions">
        <button class="action-btn" id="selectCelebrityBtn" title="选择名人">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
        <div class="more-menu-wrap">
          <button class="action-btn" id="moreBtn" title="更多">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <circle cx="12" cy="5" r="2"/><circle cx="12" cy="12" r="2"/><circle cx="12" cy="19" r="2"/>
            </svg>
          </button>
          <div class="more-menu" id="moreMenu">
            <button class="more-menu-item" id="menuPauseBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
              </svg>
              <span id="menuPauseText">暂停会议</span>
            </button>
            <div class="more-menu-divider"></div>
            <button class="more-menu-item" id="menuRestartBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
              </svg>
              <span>重新开始</span>
            </button>
            <div class="more-menu-divider"></div>
            <button class="more-menu-item" id="menuHistoryBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
              </svg>
              <span>历史会议</span>
            </button>
            <div class="more-menu-divider"></div>
            <button class="more-menu-item" id="menuNewMeetingBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
              </svg>
              <span>新建会议</span>
            </button>
            <div class="more-menu-divider"></div>
            <button class="more-menu-item" id="menuShareBtn">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/>
                <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
              </svg>
              <span>分享</span>
            </button>
          </div>
        </div>
      </div>
    </header>

    <!-- 嘉宾栏（选人后显示） -->
    <div class="guest-bar" id="guestBar" style="display:none;">
      <div class="guest-scroll" id="guestScroll"></div>
    </div>

    <!-- 暂停状态横幅 -->
    <div class="pause-banner" id="pauseBanner">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>
      </svg>
      <span>会议已暂停</span>
      <span class="resume-link" id="resumeLink">点击恢复</span>
    </div>

    <!-- 对话区域 -->
    <main class="chat-area" id="chatArea">
      <!-- 消息由JS插入 -->
    </main>

    <!-- 输入区域 -->
    <footer class="input-area">
      <div class="input-wrapper">
        <textarea
          id="messageInput"
          placeholder="说说你想讨论的问题..."
          rows="1"
          maxlength="2000"
        ></textarea>
        <button class="send-btn" id="sendBtn" disabled>
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
          </svg>
        </button>
        <button class="stop-btn" id="stopBtn" style="display:none;" title="停止生成">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"/></svg>
        </button>
      </div>
      <div class="input-footer">
        <span class="disclaimer">AI模拟名人观点，仅供思维启发参考</span>
      </div>
    </footer>

    <!-- 名人选择面板 -->
    <div class="panel-overlay" id="panelOverlay"></div>
    <div class="celebrity-panel" id="celebrityPanel">
      <div class="panel-header">
        <h2>邀请嘉宾</h2>
        <div class="panel-search">
          <input type="text" id="searchInput" placeholder="搜索名人...">
        </div>
        <button class="panel-close" id="panelCloseBtn">&times;</button>
      </div>
      <div class="panel-body" id="panelBody">
        <!-- 按领域分类的名人列表由JS动态生成 -->
      </div>
      <div class="panel-footer">
        <span class="selected-count" id="selectedCount">已选 0 位嘉宾</span>
        <button class="panel-confirm" id="panelConfirmBtn">确认</button>
      </div>
    </div>

    <!-- 分享弹窗 -->
    <div class="modal-overlay" id="shareModal">
      <div class="modal">
        <h3>分享给朋友</h3>
        <p>邀请更多人体验光年圆桌会</p>
        <div class="share-link-box">
          <input type="text" id="shareLink" readonly>
          <button id="copyLinkBtn">复制</button>
        </div>
        <div class="share-tip" id="copyTip">链接已复制！</div>
        <button class="modal-close" id="closeModal">关闭</button>
      </div>
    </div>

    <!-- 历史会议面板 -->
    <div class="history-panel" id="historyPanel">
      <div class="panel-header">
        <h2>历史会议</h2>
        <button class="panel-close" id="historyCloseBtn">&times;</button>
      </div>
      <div class="history-list" id="historyList">
        <!-- JS动态生成 -->
      </div>
    </div>

    <!-- 历史详情视图 -->
    <div class="history-detail" id="historyDetail">
      <div class="history-detail-header">
        <button class="history-back-btn" id="historyBackBtn">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
        </button>
        <div class="history-detail-title" id="historyDetailTitle">会议详情</div>
        <div class="history-detail-time" id="historyDetailTime"></div>
      </div>
      <div class="history-detail-guests" id="historyDetailGuests"></div>
      <div class="history-detail-body" id="historyDetailBody"></div>
    </div>

    <!-- 确认对话框 -->
    <div class="confirm-overlay" id="confirmOverlay">
      <div class="confirm-dialog">
        <h3 id="confirmTitle">确认操作</h3>
        <p id="confirmMsg">确定要执行此操作吗？</p>
        <div class="confirm-actions">
          <button class="confirm-cancel" id="confirmCancel">取消</button>
          <button class="confirm-ok" id="confirmOk">确定</button>
        </div>
      </div>
    </div>
  </div>

  <script src="config.js?v=7"></script>
  <script src="celebrities.js?v=8"></script>
  <script src="prompt.js?v=9"></script>
  <script src="supabase.js?v=7"></script>
  <script src="app.js?v=16"></script>
</body>
</html>
